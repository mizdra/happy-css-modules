name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write # Required for npm trusted publishing with OIDC
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Workaround for `npm stage publish` error: "Fetching non-root packages of type "directory" have been disabled"
      - run: npm config -L project set allow-directory all
      - run: npm stage publish
