name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node.js
          - node: '22'
          - node: '24'
          - node: '26'
          # less v3
          - node: '26'
            less: '3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test
        env:
          LESS_VERSION: ${{ matrix.less }}

  verify-if-example-is-outdated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run update-example
      - name: Verify if there is a difference in example
        run: |
          git add --intent-to-add .
          git diff --exit-code example
